    <script>
      const chips = document.querySelectorAll('.chip[data-filter]');
      const items = document.querySelectorAll('.gallery-item');

      function applyFilter(filter) {
        chips.forEach(c => {
          c.classList.toggle('chip--active', c.dataset.filter === filter);
        });
        items.forEach(item => {
          if (filter === 'all' || item.dataset.category === filter) {
            item.style.display = '';
          } else {
            item.style.display = 'none';
          }
        });
      }

      chips.forEach(chip => {
        chip.addEventListener('click', () => applyFilter(chip.dataset.filter));
      });


      // Lightbox
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxClose = document.getElementById('lightbox-close');
      const lightboxPrev = document.getElementById('lightbox-prev');
      const lightboxNext = document.getElementById('lightbox-next');
      let currentIndex = 0;

      function getVisibleItems() {
        return [...items].filter(item => item.style.display !== 'none');
      }

      function getAverageColor(imgEl) {
        var canvas = document.createElement('canvas');
        var ctx = canvas.getContext('2d');
        canvas.width = 50;
        canvas.height = 50;
        ctx.drawImage(imgEl, 0, 0, 50, 50);
        var data = ctx.getImageData(0, 0, 50, 50).data;
        var r = 0, g = 0, b = 0, count = 0;
        for (var i = 0; i < data.length; i += 16) {
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
          count++;
        }
        r = Math.round(r / count);
        g = Math.round(g / count);
        b = Math.round(b / count);
        return { r: r, g: g, b: b };
      }

      function setLightboxBg(imgEl) {
        try {
          var c = getAverageColor(imgEl);
          var darkR = Math.round(c.r * 0.25);
          var darkG = Math.round(c.g * 0.25);
          var darkB = Math.round(c.b * 0.25);
          lightbox.style.background = 'rgba(' + darkR + ',' + darkG + ',' + darkB + ', 0.94)';
        } catch (e) {
          lightbox.style.background = '';
        }
      }

      function openLightbox(index) {
        const visible = getVisibleItems();
        if (!visible.length) return;
        currentIndex = (index + visible.length) % visible.length;
        const img = visible[currentIndex].querySelector('img');
        lightboxImg.classList.remove('is-zoomed');
        lightboxImg.style.transformOrigin = '';
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        setLightboxBg(img);
        lightbox.classList.add('is-open');
        document.body.style.overflow = 'hidden';
        lightboxPrev.style.display = visible.length > 1 ? '' : 'none';
        lightboxNext.style.display = visible.length > 1 ? '' : 'none';
      }

      items.forEach(item => {
        item.addEventListener('click', () => {
          const visible = getVisibleItems();
          openLightbox(visible.indexOf(item));
        });
      });

      function closeLightbox() {
        lightbox.classList.remove('is-open');
        lightboxImg.classList.remove('is-zoomed');
        lightboxImg.style.transformOrigin = '';
        lightbox.style.background = '';
        document.body.style.overflow = '';
      }

      lightboxImg.addEventListener('click', e => {
        e.stopPropagation();
        if (lightboxImg.classList.contains('is-zoomed')) {
          lightboxImg.classList.remove('is-zoomed');
          lightboxImg.style.transformOrigin = '';
        } else {
          const rect = lightboxImg.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          lightboxImg.style.transformOrigin = x + '% ' + y + '%';
          lightboxImg.classList.add('is-zoomed');
        }
      });

      lightboxImg.addEventListener('mousemove', e => {
        if (!lightboxImg.classList.contains('is-zoomed')) return;
        const rect = lightboxImg.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        lightboxImg.style.transformOrigin = x + '% ' + y + '%';
      });

      lightboxPrev.addEventListener('click', e => { e.stopPropagation(); openLightbox(currentIndex - 1); });
      lightboxNext.addEventListener('click', e => { e.stopPropagation(); openLightbox(currentIndex + 1); });
      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', e => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('is-open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') openLightbox(currentIndex - 1);
        if (e.key === 'ArrowRight') openLightbox(currentIndex + 1);
      });
    </script>
